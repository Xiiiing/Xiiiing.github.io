name: ci
on:
  push:
    branches:
      - master
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with:
          python-version: 3.x
      - uses: actions/cache@v3
        with: 
          key: ${{ github.ref}}
          path: .cache
      - run: pip install mkdocs-material mdx-truly-sane-lists mkdocs-i18n
      - run: mkdocs gh-deploy --force
